<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/OurLogo.png" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Tech stack | Creative Web Design Studio</title>

  <meta
    name="description"
    content="We design experiences people remember. Premium digital interfaces for modern brands."
  />

  <!-- Open Graph / Social Preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Tech stack | Creative Web Design Studio" />
  <meta
    property="og:description"
    content="We design experiences people remember. Premium digital interfaces for modern brands."
  />

  <!-- IMPORTANT -->
  <!-- Replace with your deployed domain -->
  <meta property="og:url" content="https://lumina-studio-seven.vercel.app" />

  <!-- Preview Image -->
  <!-- Image should be inside /public -->
  <meta
    property="og:image"
    content="https://lumina-studio-seven.vercel.app/PreviewLogo.png"
  />

  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Qodex Tech | Creative Web Design Studio" />
  <meta
    name="twitter:description"
    content="We design experiences people remember. Premium digital interfaces for modern brands."
  />

  <meta
    name="twitter:image"
    content="https://lumina-studio-seven.vercel.app/PreviewLogo.png"
  />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
